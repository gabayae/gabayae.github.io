<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b2a4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4983a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8c36a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#12203a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b2a4a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Book cover background -->
  <rect width="400" height="600" rx="4" fill="url(#bg)"/>

  <!-- Spine effect -->
  <rect x="0" y="0" width="18" height="600" rx="4" fill="url(#spine)"/>
  <line x1="18" y1="0" x2="18" y2="600" stroke="#0a1220" stroke-width="0.5"/>

  <!-- Top gold accent bar -->
  <rect x="18" y="55" width="382" height="3" fill="url(#gold)" opacity="0.9"/>

  <!-- Publisher text -->
  <text x="209" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0a8b8" letter-spacing="3">NO STARCH PRESS</text>

  <!-- Geometric art: topological/data shape visualization -->
  <!-- Persistent homology / point cloud visualization -->
  <g transform="translate(209, 230)" opacity="0.95">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#d4a843" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.3"/>

    <!-- Simplex / triangulation -->
    <polygon points="-60,-40 0,-80 60,-40" fill="none" stroke="#5a8cc8" stroke-width="1.5" opacity="0.7"/>
    <polygon points="-60,-40 -30,30 0,-80" fill="none" stroke="#5a8cc8" stroke-width="1" opacity="0.5"/>
    <polygon points="60,-40 30,30 0,-80" fill="none" stroke="#5a8cc8" stroke-width="1" opacity="0.5"/>
    <polygon points="-30,30 30,30 0,80" fill="none" stroke="#5a8cc8" stroke-width="1.5" opacity="0.7"/>
    <polygon points="-60,-40 -30,30 30,30 60,-40" fill="none" stroke="#5a8cc8" stroke-width="1" opacity="0.4"/>

    <!-- Filled simplices (translucent) -->
    <polygon points="-60,-40 0,-80 60,-40" fill="#3a6ca8" opacity="0.08"/>
    <polygon points="-30,30 30,30 0,80" fill="#d4a843" opacity="0.08"/>
    <polygon points="-60,-40 -30,30 60,-40 30,30" fill="#3a6ca8" opacity="0.05"/>

    <!-- Data points -->
    <circle cx="0" cy="-80" r="5" fill="#d4a843"/>
    <circle cx="-60" cy="-40" r="5" fill="#d4a843"/>
    <circle cx="60" cy="-40" r="5" fill="#d4a843"/>
    <circle cx="-30" cy="30" r="5" fill="#d4a843"/>
    <circle cx="30" cy="30" r="5" fill="#d4a843"/>
    <circle cx="0" cy="80" r="5" fill="#d4a843"/>

    <!-- Additional scattered points -->
    <circle cx="-85" cy="10" r="3" fill="#7aa4d4" opacity="0.7"/>
    <circle cx="85" cy="10" r="3" fill="#7aa4d4" opacity="0.7"/>
    <circle cx="-40" cy="-75" r="3" fill="#7aa4d4" opacity="0.7"/>
    <circle cx="40" cy="-75" r="3" fill="#7aa4d4" opacity="0.7"/>
    <circle cx="-50" cy="65" r="3" fill="#7aa4d4" opacity="0.7"/>
    <circle cx="50" cy="65" r="3" fill="#7aa4d4" opacity="0.7"/>
    <circle cx="0" cy="-20" r="3" fill="#7aa4d4" opacity="0.6"/>
    <circle cx="-20" cy="0" r="3" fill="#7aa4d4" opacity="0.6"/>
    <circle cx="20" cy="0" r="3" fill="#7aa4d4" opacity="0.6"/>

    <!-- Persistence arcs -->
    <path d="M -85,10 Q -72,-15 -60,-40" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
    <path d="M 85,10 Q 72,-15 60,-40" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
    <path d="M -50,65 Q -40,48 -30,30" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
    <path d="M 50,65 Q 40,48 30,30" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  </g>

  <!-- Bottom gold accent bar -->
  <rect x="18" y="375" width="382" height="3" fill="url(#gold)" opacity="0.9"/>

  <!-- Title -->
  <text x="209" y="415" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#ffffff" font-weight="bold">The Shape</text>
  <text x="209" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#ffffff" font-weight="bold">of Data</text>

  <!-- Subtitle -->
  <text x="209" y="482" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#a0b0c8" letter-spacing="0.5">Geometry-Based Machine Learning</text>
  <text x="209" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#a0b0c8" letter-spacing="0.5">and Data Analysis in R</text>

  <!-- Thin separator -->
  <line x1="140" y1="520" x2="278" y2="520" stroke="#d4a843" stroke-width="0.8" opacity="0.6"/>

  <!-- Authors -->
  <text x="209" y="548" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#d4a843">Colleen M. Farrelly</text>
  <text x="209" y="570" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#d4a843">Yaé Ulrich Gaba</text>
</svg>