<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Torus point cloud -->
  <g opacity="0.9">
    <!-- Outer ring of points -->
    <circle cx="150" cy="70" r="2.5" fill="#d4a843"/>
    <circle cx="170" cy="72" r="2" fill="#d4a843"/>
    <circle cx="188" cy="78" r="2.5" fill="#d4a843"/>
    <circle cx="202" cy="88" r="2" fill="#6b8cae"/>
    <circle cx="210" cy="100" r="2.5" fill="#d4a843"/>
    <circle cx="212" cy="114" r="2" fill="#6b8cae"/>
    <circle cx="206" cy="126" r="2.5" fill="#d4a843"/>
    <circle cx="194" cy="134" r="2" fill="#d4a843"/>
    <circle cx="178" cy="138" r="2.5" fill="#6b8cae"/>
    <circle cx="160" cy="140" r="2" fill="#d4a843"/>
    <circle cx="142" cy="138" r="2.5" fill="#d4a843"/>
    <circle cx="126" cy="134" r="2" fill="#6b8cae"/>
    <circle cx="112" cy="126" r="2.5" fill="#d4a843"/>
    <circle cx="104" cy="114" r="2" fill="#d4a843"/>
    <circle cx="100" cy="100" r="2.5" fill="#6b8cae"/>
    <circle cx="104" cy="88" r="2" fill="#d4a843"/>
    <circle cx="112" cy="78" r="2.5" fill="#d4a843"/>
    <circle cx="126" cy="72" r="2" fill="#6b8cae"/>
    <!-- Inner ring of points (torus hole) -->
    <circle cx="150" cy="85" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="163" cy="87" r="1.8" fill="#ffffff" opacity="0.6"/>
    <circle cx="173" cy="93" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="178" cy="102" r="1.8" fill="#ffffff" opacity="0.6"/>
    <circle cx="175" cy="112" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="167" cy="119" r="1.8" fill="#ffffff" opacity="0.6"/>
    <circle cx="155" cy="122" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="143" cy="121" r="1.8" fill="#ffffff" opacity="0.6"/>
    <circle cx="133" cy="116" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="128" cy="108" r="1.8" fill="#ffffff" opacity="0.6"/>
    <circle cx="129" cy="96" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="135" cy="88" r="1.8" fill="#ffffff" opacity="0.6"/>
    <!-- Scattered cloud points -->
    <circle cx="155" cy="65" r="1.5" fill="#d4a843" opacity="0.5"/>
    <circle cx="195" cy="75" r="1.5" fill="#d4a843" opacity="0.4"/>
    <circle cx="215" cy="105" r="1.5" fill="#6b8cae" opacity="0.5"/>
    <circle cx="200" cy="140" r="1.5" fill="#d4a843" opacity="0.4"/>
    <circle cx="120" cy="68" r="1.5" fill="#6b8cae" opacity="0.5"/>
    <circle cx="95" cy="95" r="1.5" fill="#d4a843" opacity="0.4"/>
    <circle cx="108" cy="132" r="1.5" fill="#6b8cae" opacity="0.5"/>
    <circle cx="150" cy="145" r="1.5" fill="#d4a843" opacity="0.4"/>
  </g>
  <!-- Persistence barcode -->
  <g transform="translate(40, 158)">
    <line x1="0" y1="0" x2="220" y2="0" stroke="#6b8cae" stroke-width="0.5" opacity="0.3"/>
    <!-- H0 bars -->
    <rect x="5" y="3" width="180" height="4" rx="1" fill="#d4a843" opacity="0.8"/>
    <rect x="15" y="9" width="140" height="4" rx="1" fill="#d4a843" opacity="0.6"/>
    <rect x="25" y="15" width="80" height="4" rx="1" fill="#d4a843" opacity="0.5"/>
    <!-- H1 bar (long, representing the hole) -->
    <rect x="40" y="23" width="175" height="5" rx="1" fill="#ffffff" opacity="0.7"/>
    <!-- Short H0 bars -->
    <rect x="10" y="30" width="40" height="3" rx="1" fill="#6b8cae" opacity="0.6"/>
    <rect x="60" y="30" width="30" height="3" rx="1" fill="#6b8cae" opacity="0.5"/>
  </g>
</svg>