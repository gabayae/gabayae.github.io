<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Sierpinski-like triangle fractal -->
  <!-- Level 0: outer triangle -->
  <polygon points="150,15 270,185 30,185" fill="none" stroke="#d4a843" stroke-width="1.5" opacity="0.4"/>
  <!-- Level 1: three sub-triangles (removing center) -->
  <polygon points="150,15 210,100 90,100" fill="none" stroke="#d4a843" stroke-width="1.2" opacity="0.5"/>
  <polygon points="90,100 150,185 30,185" fill="none" stroke="#6b8cae" stroke-width="1.2" opacity="0.5"/>
  <polygon points="210,100 270,185 150,185" fill="none" stroke="#6b8cae" stroke-width="1.2" opacity="0.5"/>
  <!-- Center inverted triangle (the removed part) -->
  <polygon points="90,100 210,100 150,185" fill="#1b2a4a" stroke="#d4a843" stroke-width="0.5" opacity="0.2"/>
  <!-- Level 2: smaller sub-triangles -->
  <!-- Top -->
  <polygon points="150,15 180,57 120,57" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.6"/>
  <polygon points="120,57 150,100 90,100" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.5"/>
  <polygon points="180,57 210,100 150,100" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.5"/>
  <!-- Bottom-left -->
  <polygon points="90,100 120,142 60,142" fill="none" stroke="#6b8cae" stroke-width="0.8" opacity="0.6"/>
  <polygon points="60,142 90,185 30,185" fill="none" stroke="#6b8cae" stroke-width="0.8" opacity="0.5"/>
  <polygon points="120,142 150,185 90,185" fill="none" stroke="#6b8cae" stroke-width="0.8" opacity="0.5"/>
  <!-- Bottom-right -->
  <polygon points="210,100 240,142 180,142" fill="none" stroke="#6b8cae" stroke-width="0.8" opacity="0.6"/>
  <polygon points="180,142 210,185 150,185" fill="none" stroke="#6b8cae" stroke-width="0.8" opacity="0.5"/>
  <polygon points="240,142 270,185 210,185" fill="none" stroke="#6b8cae" stroke-width="0.8" opacity="0.5"/>
  <!-- Level 3 hints: tiny triangles at vertices -->
  <g fill="#d4a843" opacity="0.7">
    <polygon points="150,15 157,28 143,28"/>
    <polygon points="90,100 97,113 83,113"/>
    <polygon points="210,100 217,113 203,113"/>
  </g>
  <g fill="#6b8cae" opacity="0.6">
    <polygon points="30,185 37,172 23,172"/>
    <polygon points="150,185 157,172 143,172"/>
    <polygon points="270,185 277,172 263,172"/>
  </g>
  <!-- Vertex dots -->
  <circle cx="150" cy="15" r="2.5" fill="#d4a843"/>
  <circle cx="30" cy="185" r="2.5" fill="#6b8cae"/>
  <circle cx="270" cy="185" r="2.5" fill="#6b8cae"/>
</svg>