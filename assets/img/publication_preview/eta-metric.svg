<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Concentric rings -->
  <circle cx="150" cy="100" r="85" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.2"/>
  <circle cx="150" cy="100" r="70" fill="none" stroke="#d4a843" stroke-width="1.2" opacity="0.3"/>
  <circle cx="150" cy="100" r="55" fill="none" stroke="#d4a843" stroke-width="1.5" opacity="0.4"/>
  <circle cx="150" cy="100" r="40" fill="none" stroke="#6b8cae" stroke-width="1.8" opacity="0.5"/>
  <circle cx="150" cy="100" r="25" fill="none" stroke="#6b8cae" stroke-width="2" opacity="0.6"/>
  <circle cx="150" cy="100" r="12" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <!-- Radial lines -->
  <g stroke="#d4a843" stroke-width="0.5" opacity="0.15">
    <line x1="150" y1="100" x2="150" y2="10"/>
    <line x1="150" y1="100" x2="238" y2="49"/>
    <line x1="150" y1="100" x2="238" y2="151"/>
    <line x1="150" y1="100" x2="150" y2="190"/>
    <line x1="150" y1="100" x2="62" y2="151"/>
    <line x1="150" y1="100" x2="62" y2="49"/>
  </g>
  <!-- Points on rings -->
  <circle cx="150" cy="15" r="3" fill="#d4a843" opacity="0.5"/>
  <circle cx="216" cy="62" r="3" fill="#d4a843" opacity="0.5"/>
  <circle cx="205" cy="135" r="2.5" fill="#6b8cae" opacity="0.6"/>
  <circle cx="95" cy="135" r="2.5" fill="#6b8cae" opacity="0.6"/>
  <circle cx="83" cy="65" r="3" fill="#d4a843" opacity="0.5"/>
  <circle cx="175" cy="100" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="125" cy="100" r="2" fill="#ffffff" opacity="0.7"/>
  <!-- Eta symbol in center -->
  <text x="150" y="108" font-family="serif" font-size="28" fill="#d4a843" text-anchor="middle" font-style="italic" opacity="0.9">&#x03B7;</text>
  <!-- Glow effect -->
  <circle cx="150" cy="100" r="8" fill="#d4a843" opacity="0.08"/>
  <circle cx="150" cy="100" r="16" fill="#d4a843" opacity="0.05"/>
  <!-- Decorative dots on outer ring -->
  <circle cx="220" cy="55" r="1.5" fill="#d4a843" opacity="0.4"/>
  <circle cx="235" cy="100" r="1.5" fill="#d4a843" opacity="0.4"/>
  <circle cx="220" cy="145" r="1.5" fill="#6b8cae" opacity="0.4"/>
  <circle cx="80" cy="55" r="1.5" fill="#d4a843" opacity="0.4"/>
  <circle cx="65" cy="100" r="1.5" fill="#6b8cae" opacity="0.4"/>
  <circle cx="80" cy="145" r="1.5" fill="#6b8cae" opacity="0.4"/>
</svg>