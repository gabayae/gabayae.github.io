<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Spiral path 1 (from top-left) -->
  <path d="M40,30 C60,40 80,50 95,60 C110,70 120,80 128,88 C136,96 140,100 143,103 C146,106 148,108 149,109"
        fill="none" stroke="#d4a843" stroke-width="2" opacity="0.8"/>
  <path d="M42,32 C70,50 90,62 105,72 C120,82 130,92 137,98 C144,104 147,107 148.5,108.5"
        fill="none" stroke="#d4a843" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <!-- Spiral path 2 (from bottom-right) -->
  <path d="M260,170 C240,160 220,150 205,140 C190,130 178,118 170,110 C162,102 157,98 154,95 C152,93 151,92 150.5,91.5"
        fill="none" stroke="#6b8cae" stroke-width="2" opacity="0.8"/>
  <path d="M258,168 C230,150 210,138 195,128 C180,118 168,108 160,100 C155,95 152,93 151,92"
        fill="none" stroke="#6b8cae" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <!-- Iteration points on path 1 -->
  <circle cx="40" cy="30" r="4" fill="#d4a843" opacity="0.5"/>
  <circle cx="80" cy="50" r="3.5" fill="#d4a843" opacity="0.6"/>
  <circle cx="110" cy="70" r="3" fill="#d4a843" opacity="0.7"/>
  <circle cx="130" cy="90" r="2.5" fill="#d4a843" opacity="0.8"/>
  <circle cx="142" cy="102" r="2" fill="#d4a843" opacity="0.9"/>
  <!-- Iteration points on path 2 -->
  <circle cx="260" cy="170" r="4" fill="#6b8cae" opacity="0.5"/>
  <circle cx="220" cy="150" r="3.5" fill="#6b8cae" opacity="0.6"/>
  <circle cx="190" cy="130" r="3" fill="#6b8cae" opacity="0.7"/>
  <circle cx="168" cy="112" r="2.5" fill="#6b8cae" opacity="0.8"/>
  <circle cx="156" cy="98" r="2" fill="#6b8cae" opacity="0.9"/>
  <!-- Fixed point -->
  <circle cx="150" cy="100" r="8" fill="#d4a843" opacity="0.15"/>
  <circle cx="150" cy="100" r="5" fill="#d4a843" opacity="0.25"/>
  <circle cx="150" cy="100" r="3" fill="#ffffff"/>
  <!-- Contracting circles around fixed point -->
  <circle cx="150" cy="100" r="60" fill="none" stroke="#d4a843" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>
  <circle cx="150" cy="100" r="40" fill="none" stroke="#d4a843" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,3"/>
  <circle cx="150" cy="100" r="22" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.25" stroke-dasharray="2,2"/>
</svg>