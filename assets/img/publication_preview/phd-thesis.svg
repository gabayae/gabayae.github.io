<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Ordered lattice with distance annotations -->
  <!-- Lattice nodes -->
  <!-- Top -->
  <circle cx="150" cy="20" r="7" fill="#1b2a4a" stroke="#d4a843" stroke-width="2"/>
  <circle cx="150" cy="20" r="3" fill="#d4a843"/>
  <!-- Second row -->
  <circle cx="90" cy="60" r="6" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.8"/>
  <circle cx="210" cy="60" r="6" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.8"/>
  <circle cx="90" cy="60" r="2.5" fill="#d4a843" opacity="0.8"/>
  <circle cx="210" cy="60" r="2.5" fill="#d4a843" opacity="0.8"/>
  <!-- Third row -->
  <circle cx="50" cy="105" r="5.5" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.5"/>
  <circle cx="150" cy="105" r="5.5" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.5"/>
  <circle cx="250" cy="105" r="5.5" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.5"/>
  <!-- Bottom row -->
  <circle cx="30" cy="155" r="5" fill="#1b2a4a" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="100" cy="155" r="5" fill="#1b2a4a" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="200" cy="155" r="5" fill="#1b2a4a" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="270" cy="155" r="5" fill="#1b2a4a" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <!-- Ordering edges -->
  <line x1="144" y1="26" x2="96" y2="54" stroke="#d4a843" stroke-width="1.5" opacity="0.6"/>
  <line x1="156" y1="26" x2="204" y2="54" stroke="#d4a843" stroke-width="1.5" opacity="0.6"/>
  <line x1="84" y1="66" x2="56" y2="99" stroke="#d4a843" stroke-width="1.3" opacity="0.5"/>
  <line x1="96" y1="66" x2="144" y2="99" stroke="#d4a843" stroke-width="1.3" opacity="0.5"/>
  <line x1="204" y1="66" x2="156" y2="99" stroke="#d4a843" stroke-width="1.3" opacity="0.5"/>
  <line x1="216" y1="66" x2="244" y2="99" stroke="#d4a843" stroke-width="1.3" opacity="0.5"/>
  <line x1="46" y1="110" x2="34" y2="149" stroke="#6b8cae" stroke-width="1" opacity="0.4"/>
  <line x1="54" y1="110" x2="96" y2="149" stroke="#6b8cae" stroke-width="1" opacity="0.4"/>
  <line x1="146" y1="110" x2="104" y2="149" stroke="#6b8cae" stroke-width="1" opacity="0.4"/>
  <line x1="154" y1="110" x2="196" y2="149" stroke="#6b8cae" stroke-width="1" opacity="0.4"/>
  <line x1="246" y1="110" x2="204" y2="149" stroke="#6b8cae" stroke-width="1" opacity="0.4"/>
  <line x1="254" y1="110" x2="266" y2="149" stroke="#6b8cae" stroke-width="1" opacity="0.4"/>
  <!-- Distance annotations (quasi-metric values) -->
  <g font-family="serif" font-size="9" fill="#d4a843" opacity="0.5" font-style="italic">
    <text x="112" y="38">d₁</text>
    <text x="178" y="38">d₂</text>
    <text x="60" y="80">d₃</text>
    <text x="158" y="80">d₄</text>
    <text x="220" y="80">d₅</text>
  </g>
  <!-- Curved quasi-metric distance arcs -->
  <path d="M96,60 Q150,40 204,60" fill="none" stroke="#d4a843" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.3"/>
  <path d="M56,105 Q150,75 244,105" fill="none" stroke="#6b8cae" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.25"/>
  <!-- Bottom connecting arc -->
  <path d="M35,155 Q150,185 265,155" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.15"/>
</svg>