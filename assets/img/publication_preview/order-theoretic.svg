<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Hasse diagram / partial order -->
  <!-- Top element -->
  <circle cx="150" cy="25" r="6" fill="#1b2a4a" stroke="#d4a843" stroke-width="2"/>
  <!-- Second level -->
  <circle cx="90" cy="65" r="5" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.8"/>
  <circle cx="210" cy="65" r="5" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.8"/>
  <!-- Third level -->
  <circle cx="50" cy="110" r="5" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.8"/>
  <circle cx="130" cy="110" r="5" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.8"/>
  <circle cx="170" cy="110" r="5" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.8"/>
  <circle cx="250" cy="110" r="5" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.8"/>
  <!-- Bottom level -->
  <circle cx="30" cy="155" r="4.5" fill="#1b2a4a" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="80" cy="155" r="4.5" fill="#1b2a4a" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="150" cy="155" r="4.5" fill="#1b2a4a" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="220" cy="155" r="4.5" fill="#1b2a4a" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="270" cy="155" r="4.5" fill="#1b2a4a" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- Edges (ordering relation) -->
  <!-- Top to second level -->
  <line x1="145" y1="30" x2="95" y2="60" stroke="#d4a843" stroke-width="1.5" opacity="0.7"/>
  <line x1="155" y1="30" x2="205" y2="60" stroke="#d4a843" stroke-width="1.5" opacity="0.7"/>
  <!-- Second to third level -->
  <line x1="85" y1="70" x2="55" y2="105" stroke="#d4a843" stroke-width="1.3" opacity="0.6"/>
  <line x1="95" y1="70" x2="125" y2="105" stroke="#d4a843" stroke-width="1.3" opacity="0.6"/>
  <line x1="205" y1="70" x2="175" y2="105" stroke="#d4a843" stroke-width="1.3" opacity="0.6"/>
  <line x1="215" y1="70" x2="245" y2="105" stroke="#d4a843" stroke-width="1.3" opacity="0.6"/>
  <!-- Cross edge -->
  <line x1="95" y1="70" x2="165" y2="105" stroke="#6b8cae" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
  <!-- Third to bottom level -->
  <line x1="47" y1="115" x2="33" y2="150" stroke="#6b8cae" stroke-width="1" opacity="0.5"/>
  <line x1="53" y1="115" x2="77" y2="150" stroke="#6b8cae" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="115" x2="83" y2="150" stroke="#6b8cae" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="115" x2="147" y2="150" stroke="#6b8cae" stroke-width="1" opacity="0.5"/>
  <line x1="170" y1="115" x2="153" y2="150" stroke="#6b8cae" stroke-width="1" opacity="0.5"/>
  <line x1="170" y1="115" x2="217" y2="150" stroke="#6b8cae" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="115" x2="223" y2="150" stroke="#6b8cae" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="115" x2="267" y2="150" stroke="#6b8cae" stroke-width="1" opacity="0.5"/>
  <!-- Inner node dots -->
  <circle cx="150" cy="25" r="3" fill="#d4a843"/>
  <circle cx="90" cy="65" r="2.5" fill="#d4a843" opacity="0.8"/>
  <circle cx="210" cy="65" r="2.5" fill="#d4a843" opacity="0.8"/>
  <!-- Ordering arrows on right side (decorative) -->
  <text x="275" y="90" font-family="serif" font-size="16" fill="#d4a843" opacity="0.3">&#x2264;</text>
</svg>