<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Complex plane axes -->
  <line x1="30" y1="100" x2="270" y2="100" stroke="#6b8cae" stroke-width="0.8" opacity="0.3"/>
  <line x1="150" y1="15" x2="150" y2="185" stroke="#6b8cae" stroke-width="0.8" opacity="0.3"/>
  <!-- Axis labels (Re, Im) implied by small ticks -->
  <line x1="265" y1="97" x2="265" y2="103" stroke="#6b8cae" stroke-width="0.8" opacity="0.4"/>
  <line x1="147" y1="20" x2="153" y2="20" stroke="#6b8cae" stroke-width="0.8" opacity="0.4"/>
  <!-- Spiral curve 1 -->
  <path d="M150,100 C160,95 165,80 160,70 C155,60 140,55 130,62 C120,69 118,85 125,95 C132,105 148,108 158,102 C168,96 172,78 165,65 C158,52 138,46 125,55 C112,64 108,88 118,100"
        fill="none" stroke="#d4a843" stroke-width="2" opacity="0.8"/>
  <!-- Spiral curve 2 -->
  <path d="M150,100 C142,108 130,112 122,108 C114,104 112,92 118,84 C124,76 138,73 146,78 C154,83 156,96 150,104 C144,112 128,116 118,110 C108,104 104,88 112,78 C120,68 140,62 152,70"
        fill="none" stroke="#6b8cae" stroke-width="1.8" opacity="0.7"/>
  <!-- Spiral curve 3 (outer) -->
  <path d="M150,100 C170,90 185,70 178,50 C171,30 148,22 132,35 C116,48 112,78 128,98 C144,118 176,122 194,106 C212,90 214,58 196,40"
        fill="none" stroke="#d4a843" stroke-width="1.2" opacity="0.4"/>
  <!-- Points on the complex plane -->
  <circle cx="150" cy="100" r="4" fill="#d4a843"/>
  <circle cx="160" cy="70" r="2.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="125" cy="95" r="2.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="122" cy="108" r="2.5" fill="#6b8cae" opacity="0.7"/>
  <circle cx="178" cy="50" r="2" fill="#d4a843" opacity="0.5"/>
  <circle cx="132" cy="35" r="2" fill="#d4a843" opacity="0.4"/>
  <!-- Grid dots -->
  <g fill="#6b8cae" opacity="0.1">
    <circle cx="70" cy="40" r="1"/><circle cx="110" cy="40" r="1"/><circle cx="190" cy="40" r="1"/><circle cx="230" cy="40" r="1"/>
    <circle cx="70" cy="60" r="1"/><circle cx="110" cy="60" r="1"/><circle cx="190" cy="60" r="1"/><circle cx="230" cy="60" r="1"/>
    <circle cx="70" cy="140" r="1"/><circle cx="110" cy="140" r="1"/><circle cx="190" cy="140" r="1"/><circle cx="230" cy="140" r="1"/>
    <circle cx="70" cy="160" r="1"/><circle cx="110" cy="160" r="1"/><circle cx="190" cy="160" r="1"/><circle cx="230" cy="160" r="1"/>
  </g>
</svg>