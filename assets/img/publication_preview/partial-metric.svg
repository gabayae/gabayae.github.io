<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Overlapping metric balls -->
  <!-- Ball 1 -->
  <circle cx="110" cy="85" r="55" fill="#d4a843" opacity="0.08" stroke="#d4a843" stroke-width="1.2" opacity="0.3"/>
  <circle cx="110" cy="85" r="40" fill="#d4a843" opacity="0.06" stroke="#d4a843" stroke-width="0.8" opacity="0.2"/>
  <!-- Ball 2 -->
  <circle cx="190" cy="85" r="55" fill="#6b8cae" opacity="0.08" stroke="#6b8cae" stroke-width="1.2" opacity="0.3"/>
  <circle cx="190" cy="85" r="40" fill="#6b8cae" opacity="0.06" stroke="#6b8cae" stroke-width="0.8" opacity="0.2"/>
  <!-- Ball 3 -->
  <circle cx="150" cy="130" r="50" fill="#ffffff" opacity="0.04" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <circle cx="150" cy="130" r="35" fill="#ffffff" opacity="0.03" stroke="#ffffff" stroke-width="0.6" opacity="0.15"/>
  <!-- Overlap region highlight -->
  <ellipse cx="150" cy="95" rx="20" ry="25" fill="#d4a843" opacity="0.1"/>
  <!-- Center points of balls -->
  <circle cx="110" cy="85" r="4" fill="#d4a843"/>
  <circle cx="190" cy="85" r="4" fill="#6b8cae"/>
  <circle cx="150" cy="130" r="4" fill="#ffffff" opacity="0.7"/>
  <!-- Points in overlap regions -->
  <circle cx="150" cy="80" r="2.5" fill="#d4a843" opacity="0.7"/>
  <circle cx="145" cy="95" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="155" cy="100" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="130" cy="110" r="2" fill="#d4a843" opacity="0.4"/>
  <circle cx="170" cy="110" r="2" fill="#6b8cae" opacity="0.4"/>
  <!-- Partial distance indicators (dashed arcs) -->
  <path d="M110,85 Q130,60 150,80" fill="none" stroke="#d4a843" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.4"/>
  <path d="M190,85 Q170,60 150,80" fill="none" stroke="#6b8cae" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.4"/>
  <path d="M150,130 Q135,105 130,110" fill="none" stroke="#ffffff" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.3"/>
  <!-- Self-distance hint (p(x,x) > 0 for partial metric) -->
  <circle cx="110" cy="85" r="10" fill="none" stroke="#d4a843" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.4"/>
  <circle cx="190" cy="85" r="10" fill="none" stroke="#6b8cae" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.4"/>
</svg>