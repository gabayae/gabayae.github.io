<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d4a843"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ffffff" opacity="0.6"/>
    </marker>
  </defs>
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Grid -->
  <g opacity="0.15" stroke="#6b8cae" stroke-width="0.5">
    <line x1="50" y1="20" x2="50" y2="180"/><line x1="100" y1="20" x2="100" y2="180"/>
    <line x1="150" y1="20" x2="150" y2="180"/><line x1="200" y1="20" x2="200" y2="180"/>
    <line x1="250" y1="20" x2="250" y2="180"/>
    <line x1="30" y1="40" x2="270" y2="40"/><line x1="30" y1="80" x2="270" y2="80"/>
    <line x1="30" y1="120" x2="270" y2="120"/><line x1="30" y1="160" x2="270" y2="160"/>
  </g>
  <!-- Grid nodes -->
  <g fill="#6b8cae" opacity="0.4">
    <circle cx="50" cy="40" r="3"/><circle cx="100" cy="40" r="3"/><circle cx="200" cy="40" r="3"/><circle cx="250" cy="40" r="3"/>
    <circle cx="50" cy="80" r="3"/><circle cx="100" cy="80" r="3"/><circle cx="200" cy="80" r="3"/><circle cx="250" cy="80" r="3"/>
    <circle cx="50" cy="120" r="3"/><circle cx="250" cy="120" r="3"/>
    <circle cx="50" cy="160" r="3"/><circle cx="100" cy="160" r="3"/><circle cx="200" cy="160" r="3"/><circle cx="250" cy="160" r="3"/>
    <circle cx="100" cy="120" r="3"/><circle cx="200" cy="120" r="3"/>
  </g>
  <!-- Convergence arrows toward star -->
  <line x1="100" y1="80" x2="135" y2="107" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrowGold)" opacity="0.8"/>
  <line x1="200" y1="80" x2="165" y2="107" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrowGold)" opacity="0.8"/>
  <line x1="100" y1="160" x2="135" y2="133" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrowGold)" opacity="0.7"/>
  <line x1="200" y1="160" x2="165" y2="133" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrowGold)" opacity="0.7"/>
  <line x1="150" y1="40" x2="150" y2="105" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrowGold)" opacity="0.9"/>
  <line x1="50" y1="120" x2="132" y2="120" stroke="#ffffff" stroke-width="1" marker-end="url(#arrowWhite)" opacity="0.5"/>
  <line x1="250" y1="120" x2="168" y2="120" stroke="#ffffff" stroke-width="1" marker-end="url(#arrowWhite)" opacity="0.5"/>
  <line x1="50" y1="40" x2="130" y2="108" stroke="#ffffff" stroke-width="0.8" marker-end="url(#arrowWhite)" opacity="0.3"/>
  <line x1="250" y1="40" x2="170" y2="108" stroke="#ffffff" stroke-width="0.8" marker-end="url(#arrowWhite)" opacity="0.3"/>
  <line x1="50" y1="160" x2="130" y2="132" stroke="#ffffff" stroke-width="0.8" marker-end="url(#arrowWhite)" opacity="0.3"/>
  <line x1="250" y1="160" x2="170" y2="132" stroke="#ffffff" stroke-width="0.8" marker-end="url(#arrowWhite)" opacity="0.3"/>
  <!-- Central star (optimal value) -->
  <polygon points="150,108 153,116 162,116 155,122 158,130 150,125 142,130 145,122 138,116 147,116" fill="#d4a843"/>
  <circle cx="150" cy="120" r="18" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
  <circle cx="150" cy="120" r="28" fill="none" stroke="#d4a843" stroke-width="0.5" opacity="0.2"/>
  <!-- Active node at center -->
  <circle cx="150" cy="40" r="4" fill="#d4a843" opacity="0.6"/>
</svg>