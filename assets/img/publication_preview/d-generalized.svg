<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- d-dimensional lattice grid -->
  <!-- Back layer (depth illusion) -->
  <g opacity="0.15" stroke="#6b8cae" stroke-width="0.5">
    <line x1="80" y1="30" x2="80" y2="150"/><line x1="120" y1="30" x2="120" y2="150"/>
    <line x1="160" y1="30" x2="160" y2="150"/><line x1="200" y1="30" x2="200" y2="150"/>
    <line x1="240" y1="30" x2="240" y2="150"/>
    <line x1="60" y1="50" x2="260" y2="50"/><line x1="60" y1="90" x2="260" y2="90"/>
    <line x1="60" y1="130" x2="260" y2="130"/>
  </g>
  <!-- Diagonal depth lines (3D illusion) -->
  <g stroke="#6b8cae" stroke-width="0.4" opacity="0.12">
    <line x1="80" y1="50" x2="60" y2="30"/><line x1="120" y1="50" x2="100" y2="30"/>
    <line x1="160" y1="50" x2="140" y2="30"/><line x1="200" y1="50" x2="180" y2="30"/>
    <line x1="80" y1="90" x2="60" y2="70"/><line x1="120" y1="90" x2="100" y2="70"/>
    <line x1="160" y1="90" x2="140" y2="70"/><line x1="200" y1="90" x2="180" y2="70"/>
    <line x1="80" y1="130" x2="60" y2="110"/><line x1="120" y1="130" x2="100" y2="110"/>
    <line x1="160" y1="130" x2="140" y2="110"/><line x1="200" y1="130" x2="180" y2="110"/>
  </g>
  <!-- Front lattice -->
  <g stroke="#d4a843" stroke-width="0.8" opacity="0.3">
    <line x1="80" y1="50" x2="240" y2="50"/>
    <line x1="80" y1="90" x2="240" y2="90"/>
    <line x1="80" y1="130" x2="240" y2="130"/>
    <line x1="80" y1="50" x2="80" y2="130"/>
    <line x1="120" y1="50" x2="120" y2="130"/>
    <line x1="160" y1="50" x2="160" y2="130"/>
    <line x1="200" y1="50" x2="200" y2="130"/>
    <line x1="240" y1="50" x2="240" y2="130"/>
  </g>
  <!-- Lattice nodes -->
  <g>
    <circle cx="80" cy="50" r="3" fill="#d4a843" opacity="0.5"/>
    <circle cx="120" cy="50" r="3" fill="#d4a843" opacity="0.6"/>
    <circle cx="160" cy="50" r="4" fill="#d4a843" opacity="0.7"/>
    <circle cx="200" cy="50" r="3" fill="#6b8cae" opacity="0.6"/>
    <circle cx="240" cy="50" r="3" fill="#6b8cae" opacity="0.5"/>
    <circle cx="80" cy="90" r="3" fill="#d4a843" opacity="0.6"/>
    <circle cx="120" cy="90" r="4" fill="#d4a843" opacity="0.7"/>
    <circle cx="160" cy="90" r="5" fill="#ffffff" opacity="0.8"/>
    <circle cx="200" cy="90" r="4" fill="#6b8cae" opacity="0.7"/>
    <circle cx="240" cy="90" r="3" fill="#6b8cae" opacity="0.6"/>
    <circle cx="80" cy="130" r="3" fill="#6b8cae" opacity="0.5"/>
    <circle cx="120" cy="130" r="3" fill="#6b8cae" opacity="0.6"/>
    <circle cx="160" cy="130" r="4" fill="#6b8cae" opacity="0.7"/>
    <circle cx="200" cy="130" r="3" fill="#6b8cae" opacity="0.6"/>
    <circle cx="240" cy="130" r="3" fill="#6b8cae" opacity="0.5"/>
  </g>
  <!-- Depth nodes (faded) -->
  <g fill="#d4a843" opacity="0.25">
    <circle cx="60" cy="30" r="2"/><circle cx="100" cy="30" r="2"/>
    <circle cx="140" cy="30" r="2"/><circle cx="180" cy="30" r="2"/>
    <circle cx="60" cy="70" r="2"/><circle cx="100" cy="70" r="2"/>
    <circle cx="140" cy="70" r="2.5"/><circle cx="180" cy="70" r="2"/>
    <circle cx="60" cy="110" r="2"/><circle cx="100" cy="110" r="2"/>
    <circle cx="140" cy="110" r="2"/><circle cx="180" cy="110" r="2"/>
  </g>
  <!-- "d" label hint -->
  <text x="150" y="178" font-family="serif" font-size="24" fill="#d4a843" text-anchor="middle" font-style="italic" opacity="0.5">d</text>
</svg>