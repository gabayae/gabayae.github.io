<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Antenna tower 1 -->
  <line x1="55" y1="140" x2="55" y2="70" stroke="#6b8cae" stroke-width="2"/>
  <line x1="45" y1="140" x2="55" y2="100" stroke="#6b8cae" stroke-width="1.5"/>
  <line x1="65" y1="140" x2="55" y2="100" stroke="#6b8cae" stroke-width="1.5"/>
  <!-- Signal waves from tower 1 -->
  <path d="M60,68 Q72,55 80,68" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.6"/>
  <path d="M62,60 Q78,42 90,60" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.4"/>
  <path d="M64,52 Q84,30 100,52" fill="none" stroke="#d4a843" stroke-width="0.6" opacity="0.25"/>
  <!-- Antenna tower 2 -->
  <line x1="245" y1="140" x2="245" y2="70" stroke="#6b8cae" stroke-width="2"/>
  <line x1="235" y1="140" x2="245" y2="100" stroke="#6b8cae" stroke-width="1.5"/>
  <line x1="255" y1="140" x2="245" y2="100" stroke="#6b8cae" stroke-width="1.5"/>
  <!-- Signal waves from tower 2 -->
  <path d="M220,68 Q232,55 240,68" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.6"/>
  <path d="M210,60 Q227,42 238,60" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.4"/>
  <path d="M200,52 Q222,30 236,52" fill="none" stroke="#d4a843" stroke-width="0.6" opacity="0.25"/>
  <!-- Antenna tips -->
  <circle cx="55" cy="68" r="3" fill="#d4a843"/>
  <circle cx="245" cy="68" r="3" fill="#d4a843"/>
  <!-- Neural network (center) -->
  <!-- Input layer -->
  <circle cx="120" cy="55" r="4" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.5"/>
  <circle cx="120" cy="80" r="4" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.5"/>
  <circle cx="120" cy="105" r="4" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.5"/>
  <circle cx="120" cy="130" r="4" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.5"/>
  <!-- Hidden layer -->
  <circle cx="150" cy="45" r="4" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.5"/>
  <circle cx="150" cy="70" r="4" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.5"/>
  <circle cx="150" cy="95" r="4" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.5"/>
  <circle cx="150" cy="120" r="4" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.5"/>
  <circle cx="150" cy="145" r="4" fill="#1b2a4a" stroke="#6b8cae" stroke-width="1.5"/>
  <!-- Output layer -->
  <circle cx="180" cy="65" r="4" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.5"/>
  <circle cx="180" cy="90" r="4" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.5"/>
  <circle cx="180" cy="115" r="4" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.5"/>
  <!-- Connections input to hidden -->
  <g stroke="#d4a843" stroke-width="0.4" opacity="0.3">
    <line x1="124" y1="55" x2="146" y2="45"/><line x1="124" y1="55" x2="146" y2="70"/><line x1="124" y1="55" x2="146" y2="95"/>
    <line x1="124" y1="80" x2="146" y2="45"/><line x1="124" y1="80" x2="146" y2="70"/><line x1="124" y1="80" x2="146" y2="95"/><line x1="124" y1="80" x2="146" y2="120"/>
    <line x1="124" y1="105" x2="146" y2="70"/><line x1="124" y1="105" x2="146" y2="95"/><line x1="124" y1="105" x2="146" y2="120"/><line x1="124" y1="105" x2="146" y2="145"/>
    <line x1="124" y1="130" x2="146" y2="95"/><line x1="124" y1="130" x2="146" y2="120"/><line x1="124" y1="130" x2="146" y2="145"/>
  </g>
  <!-- Connections hidden to output -->
  <g stroke="#6b8cae" stroke-width="0.4" opacity="0.3">
    <line x1="154" y1="45" x2="176" y2="65"/><line x1="154" y1="45" x2="176" y2="90"/>
    <line x1="154" y1="70" x2="176" y2="65"/><line x1="154" y1="70" x2="176" y2="90"/><line x1="154" y1="70" x2="176" y2="115"/>
    <line x1="154" y1="95" x2="176" y2="65"/><line x1="154" y1="95" x2="176" y2="90"/><line x1="154" y1="95" x2="176" y2="115"/>
    <line x1="154" y1="120" x2="176" y2="90"/><line x1="154" y1="120" x2="176" y2="115"/>
    <line x1="154" y1="145" x2="176" y2="115"/>
  </g>
  <!-- Ground / devices -->
  <rect x="20" y="155" width="260" height="2" fill="#6b8cae" opacity="0.2" rx="1"/>
  <!-- Mobile devices -->
  <rect x="85" y="160" width="8" height="12" rx="1" fill="#6b8cae" opacity="0.5"/>
  <rect x="140" y="162" width="10" height="8" rx="1" fill="#6b8cae" opacity="0.4"/>
  <rect x="200" y="160" width="8" height="12" rx="1" fill="#6b8cae" opacity="0.5"/>
  <!-- Wireless signals to devices -->
  <line x1="55" y1="140" x2="89" y2="160" stroke="#d4a843" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,2"/>
  <line x1="245" y1="140" x2="204" y2="160" stroke="#d4a843" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,2"/>
  <line x1="150" y1="145" x2="145" y2="162" stroke="#d4a843" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,2"/>
</svg>