<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <marker id="aag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#d4a843"/>
    </marker>
    <marker id="aag2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#6b8cae"/>
    </marker>
  </defs>
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Alpha symbol -->
  <text x="70" y="55" font-family="serif" font-size="36" fill="#d4a843" text-anchor="middle" font-style="italic" opacity="0.7">&#x03B1;</text>
  <!-- Gamma symbol -->
  <text x="230" y="55" font-family="serif" font-size="36" fill="#6b8cae" text-anchor="middle" font-style="italic" opacity="0.7">&#x03B3;</text>
  <!-- Contracting arrows from alpha side -->
  <path d="M85,60 C100,65 115,75 125,85" fill="none" stroke="#d4a843" stroke-width="2" marker-end="url(#aag)"/>
  <path d="M130,88 C135,92 140,95 143,97" fill="none" stroke="#d4a843" stroke-width="1.8" marker-end="url(#aag)" opacity="0.8"/>
  <!-- Contracting arrows from gamma side -->
  <path d="M215,60 C200,65 185,75 175,85" fill="none" stroke="#6b8cae" stroke-width="2" marker-end="url(#aag2)"/>
  <path d="M170,88 C165,92 160,95 157,97" fill="none" stroke="#6b8cae" stroke-width="1.8" marker-end="url(#aag2)" opacity="0.8"/>
  <!-- Intermediate points -->
  <circle cx="125" cy="85" r="3" fill="#d4a843" opacity="0.6"/>
  <circle cx="175" cy="85" r="3" fill="#6b8cae" opacity="0.6"/>
  <circle cx="143" cy="97" r="2.5" fill="#d4a843" opacity="0.7"/>
  <circle cx="157" cy="97" r="2.5" fill="#6b8cae" opacity="0.7"/>
  <!-- Fixed point -->
  <circle cx="150" cy="105" r="10" fill="#d4a843" opacity="0.1"/>
  <circle cx="150" cy="105" r="5" fill="#ffffff"/>
  <!-- Contraction bands below -->
  <g opacity="0.3">
    <ellipse cx="150" cy="105" rx="80" ry="40" fill="none" stroke="#d4a843" stroke-width="0.8" stroke-dasharray="4,3"/>
    <ellipse cx="150" cy="105" rx="55" ry="28" fill="none" stroke="#d4a843" stroke-width="1" stroke-dasharray="3,3"/>
    <ellipse cx="150" cy="105" rx="30" ry="16" fill="none" stroke="#6b8cae" stroke-width="1.2"/>
  </g>
  <!-- Lower decorative arrows showing contraction -->
  <path d="M80,140 C100,135 120,125 140,112" fill="none" stroke="#d4a843" stroke-width="1" marker-end="url(#aag)" opacity="0.4"/>
  <path d="M220,140 C200,135 180,125 160,112" fill="none" stroke="#6b8cae" stroke-width="1" marker-end="url(#aag2)" opacity="0.4"/>
  <path d="M60,170 C90,160 115,140 140,118" fill="none" stroke="#d4a843" stroke-width="0.8" marker-end="url(#aag)" opacity="0.25"/>
  <path d="M240,170 C210,160 185,140 160,118" fill="none" stroke="#6b8cae" stroke-width="0.8" marker-end="url(#aag2)" opacity="0.25"/>
  <!-- Start dots -->
  <circle cx="80" cy="140" r="2.5" fill="#d4a843" opacity="0.4"/>
  <circle cx="220" cy="140" r="2.5" fill="#6b8cae" opacity="0.4"/>
  <circle cx="60" cy="170" r="2" fill="#d4a843" opacity="0.3"/>
  <circle cx="240" cy="170" r="2" fill="#6b8cae" opacity="0.3"/>
</svg>