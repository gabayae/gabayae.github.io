<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Multiple paths converging to one point -->
  <!-- Path 1: from top-left -->
  <path d="M30,25 C50,30 80,45 100,60 C120,75 135,88 145,96" fill="none" stroke="#d4a843" stroke-width="2" opacity="0.8"/>
  <!-- Path 2: from top -->
  <path d="M150,15 C150,30 150,55 150,75 C150,82 150,90 150,96" fill="none" stroke="#6b8cae" stroke-width="2" opacity="0.8"/>
  <!-- Path 3: from top-right -->
  <path d="M270,25 C250,30 220,45 200,60 C180,75 165,88 155,96" fill="none" stroke="#d4a843" stroke-width="2" opacity="0.7"/>
  <!-- Path 4: from left -->
  <path d="M20,100 C40,100 70,100 95,100 C115,100 135,100 144,100" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <!-- Path 5: from right -->
  <path d="M280,100 C260,100 230,100 205,100 C185,100 165,100 156,100" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <!-- Path 6: from bottom-left, curving -->
  <path d="M40,180 C60,170 85,150 105,135 C125,120 140,108 147,103" fill="none" stroke="#6b8cae" stroke-width="1.8" opacity="0.7"/>
  <!-- Path 7: from bottom-right, curving -->
  <path d="M260,180 C240,170 215,150 195,135 C175,120 160,108 153,103" fill="none" stroke="#6b8cae" stroke-width="1.8" opacity="0.6"/>
  <!-- Path 8: from bottom -->
  <path d="M150,190 C150,175 150,155 150,135 C150,120 150,110 150,104" fill="none" stroke="#d4a843" stroke-width="1.5" opacity="0.5"/>
  <!-- Starting point markers -->
  <circle cx="30" cy="25" r="4" fill="#d4a843" opacity="0.6"/>
  <circle cx="150" cy="15" r="4" fill="#6b8cae" opacity="0.6"/>
  <circle cx="270" cy="25" r="4" fill="#d4a843" opacity="0.5"/>
  <circle cx="20" cy="100" r="3.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="280" cy="100" r="3.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="40" cy="180" r="4" fill="#6b8cae" opacity="0.5"/>
  <circle cx="260" cy="180" r="4" fill="#6b8cae" opacity="0.5"/>
  <circle cx="150" cy="190" r="3.5" fill="#d4a843" opacity="0.4"/>
  <!-- Common fixed point (center) -->
  <circle cx="150" cy="100" r="12" fill="#d4a843" opacity="0.12"/>
  <circle cx="150" cy="100" r="7" fill="#d4a843" opacity="0.2"/>
  <circle cx="150" cy="100" r="4" fill="#ffffff"/>
</svg>