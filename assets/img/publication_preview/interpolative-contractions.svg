<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Outermost shape (large) -->
  <polygon points="150,20 250,70 230,160 70,160 50,70" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.3"/>
  <!-- Second shape -->
  <polygon points="150,40 220,75 208,140 92,140 80,75" fill="none" stroke="#d4a843" stroke-width="1.2" opacity="0.4"/>
  <!-- Third shape -->
  <polygon points="150,55 198,80 190,125 110,125 102,80" fill="none" stroke="#6b8cae" stroke-width="1.4" opacity="0.5"/>
  <!-- Fourth shape -->
  <polygon points="150,68 180,83 175,112 125,112 120,83" fill="none" stroke="#6b8cae" stroke-width="1.6" opacity="0.6"/>
  <!-- Fifth shape -->
  <polygon points="150,78 168,86 165,103 135,103 132,86" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <!-- Innermost shape -->
  <polygon points="150,85 158,89 156,97 144,97 142,89" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <!-- Convergence point -->
  <circle cx="150" cy="92" r="4" fill="#d4a843"/>
  <circle cx="150" cy="92" r="8" fill="#d4a843" opacity="0.15"/>
  <!-- Vertex dots outer -->
  <circle cx="150" cy="20" r="2" fill="#d4a843" opacity="0.4"/>
  <circle cx="250" cy="70" r="2" fill="#d4a843" opacity="0.4"/>
  <circle cx="230" cy="160" r="2" fill="#d4a843" opacity="0.4"/>
  <circle cx="70" cy="160" r="2" fill="#d4a843" opacity="0.4"/>
  <circle cx="50" cy="70" r="2" fill="#d4a843" opacity="0.4"/>
  <!-- Connecting lines to center (contraction mapping) -->
  <line x1="150" y1="20" x2="150" y2="85" stroke="#d4a843" stroke-width="0.4" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="250" y1="70" x2="158" y2="89" stroke="#d4a843" stroke-width="0.4" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="230" y1="160" x2="156" y2="97" stroke="#d4a843" stroke-width="0.4" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="70" y1="160" x2="144" y2="97" stroke="#d4a843" stroke-width="0.4" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="50" y1="70" x2="142" y2="89" stroke="#d4a843" stroke-width="0.4" opacity="0.2" stroke-dasharray="2,3"/>
</svg>