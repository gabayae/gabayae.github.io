<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <marker id="aGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d4a843"/>
    </marker>
    <marker id="aBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6b8cae"/>
    </marker>
    <marker id="aWhite" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ffffff" opacity="0.5"/>
    </marker>
  </defs>
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Points -->
  <circle cx="60" cy="50" r="7" fill="#1b2a4a" stroke="#d4a843" stroke-width="2"/>
  <circle cx="240" cy="50" r="7" fill="#1b2a4a" stroke="#d4a843" stroke-width="2"/>
  <circle cx="150" cy="100" r="7" fill="#1b2a4a" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <circle cx="60" cy="150" r="7" fill="#1b2a4a" stroke="#6b8cae" stroke-width="2"/>
  <circle cx="240" cy="150" r="7" fill="#1b2a4a" stroke="#6b8cae" stroke-width="2"/>
  <!-- Asymmetric arrows: thick one way, thin the other -->
  <!-- Top pair -->
  <path d="M70,47 Q150,20 230,47" fill="none" stroke="#d4a843" stroke-width="2.5" marker-end="url(#aGold)"/>
  <path d="M230,53 Q150,70 70,53" fill="none" stroke="#6b8cae" stroke-width="1" marker-end="url(#aBlue)" stroke-dasharray="4,3"/>
  <!-- Left side -->
  <path d="M57,58 Q30,100 57,142" fill="none" stroke="#d4a843" stroke-width="2.5" marker-end="url(#aGold)"/>
  <path d="M63,142 Q80,100 63,58" fill="none" stroke="#6b8cae" stroke-width="1" marker-end="url(#aBlue)" stroke-dasharray="4,3"/>
  <!-- Right side -->
  <path d="M243,58 Q270,100 243,142" fill="none" stroke="#d4a843" stroke-width="2" marker-end="url(#aGold)"/>
  <path d="M237,142 Q220,100 237,58" fill="none" stroke="#6b8cae" stroke-width="1" marker-end="url(#aBlue)" stroke-dasharray="4,3"/>
  <!-- Bottom pair -->
  <path d="M70,153 Q150,180 230,153" fill="none" stroke="#d4a843" stroke-width="2" marker-end="url(#aGold)"/>
  <path d="M230,147 Q150,130 70,147" fill="none" stroke="#6b8cae" stroke-width="1" marker-end="url(#aBlue)" stroke-dasharray="4,3"/>
  <!-- Diagonals to center -->
  <line x1="68" y1="55" x2="141" y2="95" stroke="#ffffff" stroke-width="1.5" marker-end="url(#aWhite)" opacity="0.4"/>
  <line x1="232" y1="55" x2="159" y2="95" stroke="#ffffff" stroke-width="1.5" marker-end="url(#aWhite)" opacity="0.4"/>
  <line x1="68" y1="145" x2="141" y2="105" stroke="#ffffff" stroke-width="1.5" marker-end="url(#aWhite)" opacity="0.4"/>
  <line x1="232" y1="145" x2="159" y2="105" stroke="#ffffff" stroke-width="1.5" marker-end="url(#aWhite)" opacity="0.4"/>
  <!-- d(x,y) ≠ d(y,x) visual hint: different thickness -->
  <circle cx="60" cy="50" r="3" fill="#d4a843"/>
  <circle cx="240" cy="50" r="3" fill="#d4a843"/>
  <circle cx="150" cy="100" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="60" cy="150" r="3" fill="#6b8cae"/>
  <circle cx="240" cy="150" r="3" fill="#6b8cae"/>
</svg>