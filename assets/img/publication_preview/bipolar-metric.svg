<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Left pole glow -->
  <circle cx="60" cy="100" r="30" fill="#d4a843" opacity="0.06"/>
  <circle cx="60" cy="100" r="20" fill="#d4a843" opacity="0.1"/>
  <!-- Right pole glow -->
  <circle cx="240" cy="100" r="30" fill="#6b8cae" opacity="0.06"/>
  <circle cx="240" cy="100" r="20" fill="#6b8cae" opacity="0.1"/>
  <!-- Curved connecting lines (top set) -->
  <path d="M72,92 Q150,20 228,92" fill="none" stroke="#d4a843" stroke-width="1.8" opacity="0.7"/>
  <path d="M72,88 Q150,35 228,88" fill="none" stroke="#d4a843" stroke-width="1.2" opacity="0.5"/>
  <path d="M72,84 Q150,50 228,84" fill="none" stroke="#d4a843" stroke-width="0.8" opacity="0.3"/>
  <!-- Curved connecting lines (bottom set) -->
  <path d="M72,108 Q150,180 228,108" fill="none" stroke="#6b8cae" stroke-width="1.8" opacity="0.7"/>
  <path d="M72,112 Q150,165 228,112" fill="none" stroke="#6b8cae" stroke-width="1.2" opacity="0.5"/>
  <path d="M72,116 Q150,150 228,116" fill="none" stroke="#6b8cae" stroke-width="0.8" opacity="0.3"/>
  <!-- Straight center line -->
  <line x1="72" y1="100" x2="228" y2="100" stroke="#ffffff" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4"/>
  <!-- Left pole (alpha) -->
  <circle cx="60" cy="100" r="12" fill="#1b2a4a" stroke="#d4a843" stroke-width="2.5"/>
  <text x="60" y="105" font-family="serif" font-size="14" fill="#d4a843" text-anchor="middle" font-style="italic">&#x03B1;</text>
  <!-- Right pole -->
  <circle cx="240" cy="100" r="12" fill="#1b2a4a" stroke="#6b8cae" stroke-width="2.5"/>
  <text x="240" y="105" font-family="serif" font-size="14" fill="#6b8cae" text-anchor="middle" font-style="italic">b<tspan font-size="10" dy="3">k</tspan></text>
  <!-- Points along the curves -->
  <circle cx="120" cy="58" r="2.5" fill="#d4a843" opacity="0.6"/>
  <circle cx="150" cy="45" r="2" fill="#d4a843" opacity="0.5"/>
  <circle cx="180" cy="58" r="2.5" fill="#d4a843" opacity="0.6"/>
  <circle cx="120" cy="142" r="2.5" fill="#6b8cae" opacity="0.6"/>
  <circle cx="150" cy="155" r="2" fill="#6b8cae" opacity="0.5"/>
  <circle cx="180" cy="142" r="2.5" fill="#6b8cae" opacity="0.6"/>
  <!-- Center meeting point -->
  <circle cx="150" cy="100" r="3" fill="#ffffff" opacity="0.5"/>
</svg>