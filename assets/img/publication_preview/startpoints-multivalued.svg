<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <marker id="amv" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#d4a843"/>
    </marker>
    <marker id="amvb" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#6b8cae"/>
    </marker>
    <marker id="amvw" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#ffffff" opacity="0.5"/>
    </marker>
  </defs>
  <rect width="300" height="200" fill="#1b2a4a"/>
  <!-- Start point glow -->
  <circle cx="40" cy="100" r="20" fill="#d4a843" opacity="0.08"/>
  <circle cx="40" cy="100" r="12" fill="#d4a843" opacity="0.12"/>
  <!-- Start point -->
  <circle cx="40" cy="100" r="8" fill="#d4a843"/>
  <!-- Primary branches -->
  <line x1="50" y1="95" x2="100" y2="55" stroke="#d4a843" stroke-width="2" marker-end="url(#amv)"/>
  <line x1="50" y1="100" x2="105" y2="100" stroke="#d4a843" stroke-width="2" marker-end="url(#amv)"/>
  <line x1="50" y1="105" x2="100" y2="145" stroke="#d4a843" stroke-width="2" marker-end="url(#amv)"/>
  <!-- Secondary branch nodes -->
  <circle cx="110" cy="50" r="5" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.5"/>
  <circle cx="115" cy="100" r="5" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.5"/>
  <circle cx="110" cy="150" r="5" fill="#1b2a4a" stroke="#d4a843" stroke-width="1.5"/>
  <!-- Secondary branches from top -->
  <line x1="116" y1="46" x2="165" y2="28" stroke="#6b8cae" stroke-width="1.5" marker-end="url(#amvb)"/>
  <line x1="117" y1="52" x2="165" y2="58" stroke="#6b8cae" stroke-width="1.5" marker-end="url(#amvb)"/>
  <!-- Secondary branches from middle -->
  <line x1="122" y1="96" x2="165" y2="80" stroke="#6b8cae" stroke-width="1.5" marker-end="url(#amvb)"/>
  <line x1="122" y1="100" x2="165" y2="100" stroke="#6b8cae" stroke-width="1.5" marker-end="url(#amvb)"/>
  <line x1="122" y1="104" x2="165" y2="120" stroke="#6b8cae" stroke-width="1.5" marker-end="url(#amvb)"/>
  <!-- Secondary branches from bottom -->
  <line x1="116" y1="148" x2="165" y2="142" stroke="#6b8cae" stroke-width="1.5" marker-end="url(#amvb)"/>
  <line x1="117" y1="154" x2="165" y2="170" stroke="#6b8cae" stroke-width="1.5" marker-end="url(#amvb)"/>
  <!-- Tertiary nodes -->
  <circle cx="175" cy="25" r="3.5" fill="#6b8cae" opacity="0.7"/>
  <circle cx="175" cy="58" r="3.5" fill="#6b8cae" opacity="0.7"/>
  <circle cx="175" cy="78" r="3.5" fill="#6b8cae" opacity="0.7"/>
  <circle cx="175" cy="100" r="3.5" fill="#6b8cae" opacity="0.7"/>
  <circle cx="175" cy="122" r="3.5" fill="#6b8cae" opacity="0.7"/>
  <circle cx="175" cy="142" r="3.5" fill="#6b8cae" opacity="0.7"/>
  <circle cx="175" cy="172" r="3.5" fill="#6b8cae" opacity="0.7"/>
  <!-- Tertiary fine branches -->
  <line x1="180" y1="25" x2="220" y2="18" stroke="#ffffff" stroke-width="0.8" marker-end="url(#amvw)" opacity="0.4"/>
  <line x1="180" y1="25" x2="220" y2="32" stroke="#ffffff" stroke-width="0.8" marker-end="url(#amvw)" opacity="0.4"/>
  <line x1="180" y1="58" x2="220" y2="52" stroke="#ffffff" stroke-width="0.8" marker-end="url(#amvw)" opacity="0.4"/>
  <line x1="180" y1="58" x2="220" y2="65" stroke="#ffffff" stroke-width="0.8" marker-end="url(#amvw)" opacity="0.4"/>
  <line x1="180" y1="100" x2="220" y2="93" stroke="#ffffff" stroke-width="0.8" marker-end="url(#amvw)" opacity="0.4"/>
  <line x1="180" y1="100" x2="220" y2="107" stroke="#ffffff" stroke-width="0.8" marker-end="url(#amvw)" opacity="0.4"/>
  <line x1="180" y1="142" x2="220" y2="135" stroke="#ffffff" stroke-width="0.8" marker-end="url(#amvw)" opacity="0.4"/>
  <line x1="180" y1="142" x2="220" y2="149" stroke="#ffffff" stroke-width="0.8" marker-end="url(#amvw)" opacity="0.4"/>
  <line x1="180" y1="172" x2="220" y2="165" stroke="#ffffff" stroke-width="0.8" marker-end="url(#amvw)" opacity="0.4"/>
  <line x1="180" y1="172" x2="220" y2="179" stroke="#ffffff" stroke-width="0.8" marker-end="url(#amvw)" opacity="0.4"/>
  <!-- Terminal dots -->
  <g fill="#ffffff" opacity="0.35">
    <circle cx="228" cy="18" r="2"/><circle cx="228" cy="32" r="2"/>
    <circle cx="228" cy="52" r="2"/><circle cx="228" cy="65" r="2"/>
    <circle cx="228" cy="93" r="2"/><circle cx="228" cy="107" r="2"/>
    <circle cx="228" cy="135" r="2"/><circle cx="228" cy="149" r="2"/>
    <circle cx="228" cy="165" r="2"/><circle cx="228" cy="179" r="2"/>
  </g>
</svg>